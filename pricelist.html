<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricelist Allenara Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #29262B; color: #FAF5FF; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { background-color: #AC5FDB; color: white; border-radius: 99px; }
        .product-card { 
            background: #3C3541; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(172, 95, 219, 0.2);
        }
        .product-card:hover { transform: translateY(-5px); border-color: #AC5FDB; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(41, 38, 43, 0.9); backdrop-filter: blur(10px); }
        .logo-box { background: white; border-radius: 18px; padding: 8px; width: 60px; height: 60px; flex-shrink: 0; }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">

    <header class="p-6">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-[#3C3541] p-2 rounded-full text-[#E3A2EE]">❮</a>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Premium Apps</h1>
                <p class="text-[10px] text-[#E3A2EE] font-bold tracking-widest uppercase">Allenara Store Selection</p>
            </div>
        </div>
    </header>

    <div class="sticky-header px-4 pb-4">
        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Cari aplikasi premium..." 
                   class="w-full bg-[#3C3541] border-none rounded-2xl py-3 px-5 text-sm text-white focus:ring-1 focus:ring-[#AC5FDB] outline-none">
        </div>
        <div id="category-tabs" class="flex gap-2 overflow-x-auto no-scrollbar text-[11px] font-bold uppercase">
            <button onclick="filterByCat('Semua')" class="tab-btn px-4 py-2 whitespace-nowrap tab-active">Semua</button>
        </div>
    </div>

    <main id="price-container" class="p-4 grid grid-cols-1 gap-4">
        <div class="py-20 text-center text-[#E3A2EE] text-xs font-bold animate-pulse uppercase tracking-widest">Memuat Katalog...</div>
    </main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5xFkFRkK1496td-bAa9zCZ2MetND0WmlXmXoKD4qEz9PlQA1VeMq7hScn1hzZIY-KcJ7Zk5vFs5c6/pub?output=csv'; 

        let allData = [];

        // Fungsi dapet logo otomatis
        function getLogo(name) {
            const cleanName = name.toLowerCase();
            if(cleanName.includes('netflix')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/netflix.png';
            if(cleanName.includes('disney')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/disney-plus.png';
            if(cleanName.includes('youtube')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/youtube.png';
            if(cleanName.includes('spotify')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/spotify.png';
            if(cleanName.includes('canva')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/canva.png';
            if(cleanName.includes('capcut')) return 'https://img.utdstc.com/icon/921/2e1/9212e16f39389f4f46c6a66a18274474744d2d63428d098751.png';
            // Default icon kalau nggak ketemu
            return 'https://i.imgur.com/f9ZpEzM.jpeg'; 
        }

        async function loadData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                
                allData = lines.slice(1).map(line => {
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (parts.length >= 4) {
                        return {
                            kategori: parts[0].replace(/"/g, '').trim(),
                            nama: parts[1].replace(/"/g, '').trim(),
                            durasi: parts[2].replace(/"/g, '').trim(),
                            harga: parts[3].replace(/"/g, '').trim()
                        };
                    }
                    return null;
                }).filter(item => item && item.nama);

                renderCategories();
                renderPriceList(allData);
            } catch (err) {
                document.getElementById('price-container').innerHTML = `<p class="text-center text-red-400">Gagal Sinkronisasi.</p>`;
            }
        }

        function renderCategories() {
            const tabs = document.getElementById('category-tabs');
            const categories = ['Semua', ...new Set(allData.map(item => item.kategori))];
            tabs.innerHTML = categories.map(cat => 
                `<button onclick="filterByCat('${cat}', this)" class="tab-btn px-4 py-2 whitespace-nowrap border border-[#3C3541] rounded-full">${cat}</button>`
            ).join('');
            tabs.querySelector('button').classList.add('tab-active');
        }

        function renderPriceList(data) {
            const container = document.getElementById('price-container');
            container.innerHTML = data.map(item => `
                <div class="product-card p-4 rounded-[25px] flex items-center gap-4">
                    <div class="logo-box flex items-center justify-center overflow-hidden">
                        <img src="${getLogo(item.nama)}" class="w-full h-full object-contain" alt="Logo">
                    </div>
                    <div class="flex-1">
                        <h3 class="text-[13px] font-black uppercase tracking-tight">${item.nama}</h3>
                        <p class="text-[10px] text-[#E3A2EE] font-bold mt-1 bg-[#29262B] inline-block px-2 py-0.5 rounded-lg border border-[#AC5FDB]">${item.durasi}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[15px] font-black text-[#AC5FDB]">${item.harga.includes('Hubungi') ? item.harga : 'Rp' + item.harga}</p>
                        <p class="text-[8px] font-black text-green-400 mt-1 uppercase">Instant</p>
                    </div>
                </div>
            `).join('');
        }

        function filterByCat(cat, el) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
            const filtered = cat === 'Semua' ? allData : allData.filter(i => i.kategori === cat);
            renderPriceList(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(i => i.nama.toLowerCase().includes(val) || i.durasi.toLowerCase().includes(val));
            renderPriceList(filtered);
        });

        loadData();
    </script>
</body>
</html>
