<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricelist Allenara Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #D5C5C8; /* Pale Slate - Latar Belakang Utama */
            color: #604D53; /* Taupe Grey - Teks Utama */
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .tab-active { 
            background-color: #DB7F8E; /* Old Rose */
            color: white; 
            border-radius: 99px; 
        }
        
        .product-card { 
            background: #FDF1F2; /* Base dari Soft Blush tapi lebih terang agar bersih */
            transition: all 0.3s ease; 
            border: 1.5px solid #FFDBDA; /* Soft Blush Border */
        }
        
        .product-card:hover { 
            transform: translateY(-3px); 
            border-color: #DB7F8E; /* Old Rose saat hover */
            box-shadow: 0 10px 20px rgba(219, 127, 142, 0.1);
        }
        
        .sticky-header { 
            position: sticky; 
            top: 0; 
            z-index: 50; 
            background: rgba(213, 197, 200, 0.9); /* Pale Slate Transparan */
            backdrop-filter: blur(12px); 
        }
        
        .logo-box { 
            background: white; 
            border-radius: 18px; 
            padding: 8px; 
            width: 55px; 
            height: 55px; 
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        input::placeholder { color: #9DA3A4; } /* Cool Steel untuk placeholder */
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen pb-10">

    <header class="p-6">
        <div class="flex items-center gap-4">
            <a href="index.html" class="bg-[#9DA3A4] p-2 rounded-full text-white hover:bg-[#DB7F8E] transition-all shadow-sm">❮</a>
            <div>
                <h1 class="text-xl font-black uppercase tracking-tighter text-[#604D53]">Premium Catalog</h1>
                <p class="text-[10px] text-[#DB7F8E] font-bold tracking-widest uppercase">Allenara Digital Access</p>
            </div>
        </div>
    </header>

    <div class="sticky-header px-4 pb-4">
        <div class="mb-4">
            <input type="text" id="searchInput" placeholder="Cari layanan premium..." 
                   class="w-full bg-white border-2 border-[#FFDBDA] rounded-2xl py-3 px-5 text-sm text-[#604D53] focus:border-[#DB7F8E] outline-none transition-all shadow-sm">
        </div>
        <div id="category-tabs" class="flex gap-2 overflow-x-auto no-scrollbar text-[11px] font-bold uppercase">
            </div>
    </div>

    <main id="price-container" class="p-4 grid grid-cols-1 gap-3">
        <div class="py-20 text-center text-[#DB7F8E] text-xs font-bold animate-pulse uppercase tracking-widest">
            Menyinkronkan Katalog...
        </div>
    </main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5xFkFRkK1496td-bAa9zCZ2MetND0WmlXmXoKD4qEz9PlQA1VeMq7hScn1hzZIY-KcJ7Zk5vFs5c6/pub?output=csv'; 

        let allData = [];

        function getLogo(name) {
            const n = name.toLowerCase();
            if(n.includes('netflix')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/netflix.png';
            if(n.includes('disney')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/disney-plus.png';
            if(n.includes('youtube')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/youtube.png';
            if(n.includes('spotify')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/spotify.png';
            if(n.includes('canva')) return 'https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/canva.png';
            if(n.includes('capcut')) return 'https://img.utdstc.com/icon/921/2e1/9212e16f39389f4f46c6a66a18274474744d2d63428d098751.png';
            return 'https://i.imgur.com/f9ZpEzM.jpeg'; 
        }

        function formatHarga(val) {
            return val ? val.trim() : '-';
        }

        async function loadData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                
                allData = lines.slice(1).map(line => {
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (parts.length >= 4) {
                        return {
                            kategori: parts[0].replace(/"/g, '').trim(),
                            nama: parts[1].replace(/"/g, '').trim(),
                            durasi: parts[2].replace(/"/g, '').trim(),
                            harga: parts[3].replace(/"/g, '').trim()
                        };
                    }
                    return null;
                }).filter(item => item && item.nama);

                renderCategories();
                renderPriceList(allData);
            } catch (err) {
                document.getElementById('price-container').innerHTML = `<p class="text-center text-red-400">Gagal Memperbarui Data.</p>`;
            }
        }

        function renderCategories() {
            const tabs = document.getElementById('category-tabs');
            const categories = ['Semua', ...new Set(allData.map(item => item.kategori))];
            tabs.innerHTML = categories.map(cat => 
                `<button onclick="filterByCat('${cat}', this)" class="tab-btn px-5 py-2.5 whitespace-nowrap border-2 border-[#FFDBDA] bg-white rounded-full transition-all">${cat}</button>`
            ).join('');
            tabs.querySelector('button').classList.add('tab-active');
        }

        function renderPriceList(data) {
            const container = document.getElementById('price-container');
            container.innerHTML = data.map(item => `
                <div class="product-card p-4 rounded-[28px] flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-4">
                        <div class="logo-box flex items-center justify-center overflow-hidden">
                            <img src="${getLogo(item.nama)}" class="w-full h-full object-contain" alt="Logo">
                        </div>
                        <div>
                            <h3 class="text-[13px] font-black uppercase tracking-tight text-[#604D53]">${item.nama}</h3>
                            <p class="text-[9px] text-white font-bold mt-1 bg-[#DB7F8E] inline-block px-2.5 py-1 rounded-lg border border-[#FFDBDA]">${item.durasi}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[15px] font-black text-[#DB7F8E] tracking-tighter">${formatHarga(item.harga)}</p>
                    </div>
                </div>
            `).join('');
        }

        function filterByCat(cat, el) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
            const filtered = cat === 'Semua' ? allData : allData.filter(i => i.kategori === cat);
            renderPriceList(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(i => i.nama.toLowerCase().includes(val) || i.durasi.toLowerCase().includes(val));
            renderPriceList(filtered);
        });

        loadData();
    </script>
</body>
</html>
