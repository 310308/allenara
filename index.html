<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricelist Allenara Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { border-bottom: 2px solid #000; color: #000; font-weight: 800; }
        .card-item { transition: all 0.2s ease-in-out; border: 1px solid #f1f1f1; }
        .card-item:hover { border-color: #000; transform: translateY(-1px); }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(252, 252, 252, 0.95); backdrop-filter: blur(8px); }
    </style>
</head>
<body class="max-w-md mx-auto border-x border-gray-50 min-h-screen">

    <header class="p-6 pb-2">
        <h1 class="text-xl font-black tracking-tighter uppercase text-black">Allenara Store</h1>
        <p class="text-[10px] text-gray-400 uppercase tracking-[0.2em] font-bold mt-1">Premium Digital Access</p>
    </header>

    <div class="sticky-header">
        <div id="category-tabs" class="flex gap-6 px-6 overflow-x-auto no-scrollbar border-b border-gray-100 text-[12px] text-gray-400 py-4 font-bold uppercase">
            <button onclick="filterByCat('Semua')" class="tab-btn tab-active whitespace-nowrap">Semua</button>
        </div>
        <div class="p-4">
            <input type="text" id="searchInput" placeholder="Cari aplikasi..." 
                   class="w-full bg-gray-100 border-none rounded-xl py-3 px-5 text-sm focus:ring-1 focus:ring-black outline-none">
        </div>
    </div>

    <main id="price-container" class="p-4 space-y-3">
        <div class="py-20 text-center text-gray-400 text-xs">SINKRONISASI DATABASE...</div>
    </main>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS5xFkFRkK1496td-bAa9zCZ2MetND0WmlXmXoKD4qEz9PlQA1VeMq7hScn1hzZIY-KcJ7Zk5vFs5c6/pub?output=csv'; 

        let allData = [];

        async function loadData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/);
                
                allData = lines.slice(1).map(line => {
                    // Regex ini untuk memisahkan koma dengan sangat teliti
                    const parts = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (parts.length >= 4) {
                        return {
                            kategori: parts[0].replace(/"/g, '').trim(),
                            nama: parts[1].replace(/"/g, '').trim(),
                            durasi: parts[2].replace(/"/g, '').trim(),
                            harga: parts[3].replace(/"/g, '').trim()
                        };
                    }
                    return null;
                }).filter(item => item && item.nama);

                renderCategories();
                renderPriceList(allData);
            } catch (err) {
                document.getElementById('price-container').innerHTML = `<p class="text-center text-red-400">Error: Gagal Load Data</p>`;
            }
        }

        function renderCategories() {
            const tabs = document.getElementById('category-tabs');
            const categories = ['Semua', ...new Set(allData.map(item => item.kategori))];
            tabs.innerHTML = categories.map(cat => 
                `<button onclick="filterByCat('${cat}', this)" class="tab-btn whitespace-nowrap">${cat}</button>`
            ).join('');
            tabs.firstElementChild.classList.add('tab-active');
        }

        function renderPriceList(data) {
            const container = document.getElementById('price-container');
            container.innerHTML = data.map(item => `
                <div class="card-item bg-white p-4 rounded-xl flex justify-between items-center shadow-sm">
                    <div class="flex-1">
                        <p class="text-[9px] font-black text-blue-600 uppercase mb-0.5">${item.kategori}</p>
                        <h3 class="text-[14px] font-extrabold text-gray-900 uppercase leading-tight">${item.nama}</h3>
                        <div class="mt-2">
                            <span class="text-[10px] font-bold text-gray-600 bg-gray-100 px-2 py-1 rounded border border-gray-200">${item.durasi}</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[16px] font-black text-black">Rp${item.harga}</p>
                        <p class="text-[9px] text-green-500 font-black mt-1 uppercase flex items-center justify-end gap-1">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Ready
                        </p>
                    </div>
                </div>
            `).join('');
        }

        function filterByCat(cat, el) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            if(el) el.classList.add('tab-active');
            const filtered = cat === 'Semua' ? allData : allData.filter(i => i.kategori === cat);
            renderPriceList(filtered);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allData.filter(i => 
                i.nama.toLowerCase().includes(val) || 
                i.durasi.toLowerCase().includes(val) ||
                i.kategori.toLowerCase().includes(val)
            );
            renderPriceList(filtered);
        });

        loadData();
    </script>
</body>
</html>
