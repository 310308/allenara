<!DOCTYPE html>
<html lang="id">
<head>

    <title>Allenara Store | Digital & Apps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #D5C5C8; /* Pale Slate - Background Utama */
            color: #604D53; /* Taupe Grey - Teks Utama */
        }
        .glass-card {
            background: #FDF1F2; /* Soft Blush - Kotak Utama */
            border-radius: 40px;
            box-shadow: 0 15px 35px rgba(96, 77, 83, 0.1);
            border: 2px solid #FFDBDA; /* Soft Blush Border */
        }
        .btn-link {
            background: #DB7F8E; /* Old Rose - Warna Tombol */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: white;
            border: 1px solid transparent;
        }
        .btn-link:hover {
            transform: translateY(-3px) scale(1.02);
            background: #FFDBDA; /* Soft Blush saat hover */
            color: #DB7F8E; /* Teks jadi Old Rose saat hover */
            box-shadow: 0 8px 20px rgba(219, 127, 142, 0.2);
        }
        .profile-img {
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            overflow: hidden;
            border: 4px solid #DB7F8E; /* Border Old Rose di foto */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
    </style>
</head>
